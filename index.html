<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏡 SOM 附近公寓列表 🐕‍🦺</title>
    <style>
        :root {
            /* 耶鲁大学标准配色方案 */
            --yale-blue: #00356b;
            --yale-gray: #5e6d7a;
            --bg: #f5f7f9; 
            --card-bg: #ffffff;
            --text-main: #222222;
            --text-light: #5e6d7a;
        }
        body {
            font-family: "YaleDesign", "Times New Roman", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        .title-link {
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .title-link:hover {
            opacity: 0.8;
        }
        h1 {
            color: var(--yale-blue);
            font-size: 32px;
            margin: 0;
            border-bottom: 3px solid var(--yale-blue);
            padding-bottom: 10px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 6px; 
            padding: 24px;
            box-shadow: 0 4px 12px rgba(0, 53, 107, 0.08);
            border-top: 5px solid var(--yale-blue);
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.3s ease;
        }
        .card:hover {
            box-shadow: 0 8px 24px rgba(0, 53, 107, 0.15);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .apt-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--yale-blue);
            text-decoration: none;
            line-height: 1.2;
            padding-right: 10px;
        }
        
        /* 头部右侧按钮组：将心形按钮和评分并排 */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px; /* 按钮和星星之间的间距 */
        }

        /* 独立的红心按钮样式 */
        .heart-btn {
            background-color: #fff0f3;
            border: 1px solid #ffb3c1;
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(255, 77, 109, 0.15);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 鼠标悬停时的立体点击感 */
        .heart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 77, 109, 0.3);
            background-color: #ffe6ea;
        }
        /* 心跳小动画保留在按钮内部 */
        .heart-icon {
            font-size: 14px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .rating {
            background: #eef4fb;
            color: var(--yale-blue);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            display: flex;
            align-items: center;
        }
        
        .info-row {
            margin: 10px 0;
            font-size: 15px;
            display: flex;
            align-items: flex-start;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 8px;
        }
        .info-icon {
            margin-right: 12px;
            font-size: 18px;
            min-width: 20px;
        }
        .notes-section {
            margin-top: 15px;
            padding-top: 10px;
            font-size: 14px;
            color: #555;
            background: #f9f9f9;
            padding: 10px;
            border-left: 3px solid #ddd;
            font-style: italic;
        }
        .recommendation-box {
            margin-top: 15px;
            padding: 12px 15px;
            background-color: #fff0f3;
            border-left: 4px solid #ff4d6d;
            border-radius: 0 4px 4px 0;
            color: #800f2f;
            font-size: 15px;
            line-height: 1.5;
        }
        .recommendation-box b {
            color: #c1121f;
            display: block;
            margin-bottom: 6px;
            font-size: 16px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
            padding-top: 15px;
        }
        .tag {
            background: #f0f2f5;
            color: var(--yale-blue);
            padding: 4px 12px;
            border-radius: 2px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .tag-promo {
            background: #fff0f0;
            color: #b71c1c;
            border: 1px solid #ffcdd2;
        }
        .loading {
            text-align: center;
            color: var(--yale-gray);
            grid-column: 1 / -1;
            padding: 50px;
        }
    </style>
</head>
<body>

    <header>
        <a href="https://docs.google.com/spreadsheets/d/1aOBMpWpuHDC6qtuPj9m1i7pTVCX6CsdMwE-LosD2cCA/edit?usp=sharing" target="_blank" class="title-link">
            <h1>SOM 附近公寓列表 🏡 👩🏻‍💻 🐕‍🦺</h1>
        </a>
    </header>

    <div class="container" id="app">
        <div class="loading">正在加载房源数据... ✨</div>
    </div>

    <script>
        fetch('data.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n');
                const container = document.getElementById('app');
                container.innerHTML = ''; 

                let apartments = [];

                for (let i = 2; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols.length < 10 || !cols[0].trim()) continue;

                    apartments.push({
                        name: cols[0],
                        website: cols[2],
                        studioPrice: cols[4],
                        b2Price: cols[5],
                        promo: cols[6],
                        rating: cols[9],
                        commute: cols[10],
                        washer: cols[11],
                        ac: cols[14],
                        notes: cols[18] ? cols[18].trim().replace('\r', '') : '',
                        recommendation: cols[19] ? cols[19].trim().replace('\r', '') : '' 
                    });
                }

                // 排序逻辑：有G0意见的优先
                apartments.sort((a, b) => {
                    const aHasRec = (a.recommendation && a.recommendation !== '/' && a.recommendation !== '') ? 1 : 0;
                    const bHasRec = (b.recommendation && b.recommendation !== '/' && b.recommendation !== '') ? 1 : 0;
                    return bHasRec - aHasRec; 
                });

                apartments.forEach((apt, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const hasRec = apt.recommendation && apt.recommendation !== '/' && apt.recommendation !== '';
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <a href="${apt.website}" target="_blank" class="apt-name">${apt.name} 🔗</a>
                            <div class="header-actions">
                                ${hasRec ? `
                                <div class="heart-btn" title="包含 G0 意见" onclick="document.getElementById('rec-${index}').scrollIntoView({behavior: 'smooth', block: 'center'});">
                                    <span class="heart-icon">❤️</span>
                                </div>` : ''} 
                                <span class="rating">⭐ ${apt.rating || 'N/A'}</span>
                            </div>
                        </div>
                        <div class="info-row">
                            <span class="info-icon">💰</span>
                            <span><b>Studio:</b> ${apt.studioPrice || '/'} | <b>2B2B:</b> ${apt.b2Price || '/'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-icon">🚶‍♀️</span>
                            <span><b>通勤:</b> ${apt.commute || '未知'}</span>
                        </div>
                        
                        ${apt.notes && apt.notes !== '/' ? `
                            <div class="notes-section">
                                <b>附注:</b> ${apt.notes}
                            </div>
                        ` : ''}

                        ${hasRec ? `
                            <div id="rec-${index}" class="recommendation-box">
                                <b>G0意见</b>
                                ${apt.recommendation}
                            </div>
                        ` : ''}

                        <div class="tags">
                            ${apt.washer && apt.washer.includes('有') ? `<span class="tag">室内洗烘</span>` : ''}
                            ${apt.ac && apt.ac !== '/' ? `<span class="tag">❄️ ${apt.ac}</span>` : ''}
                            ${apt.promo && apt.promo !== '/' ? `<span class="tag tag-promo">🎁 ${apt.promo}</span>` : ''}
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('app').innerHTML = '<div class="loading">读取数据失败了，请检查 data.csv 是否上传成功 😢</div>';
                console.error('Error fetching CSV:', error);
            });
    </script>
</body>
</html>
